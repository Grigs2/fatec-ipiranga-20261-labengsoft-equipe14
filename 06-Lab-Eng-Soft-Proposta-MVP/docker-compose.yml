version: '3.8'

services:
  # 1. Banco de Dados (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: tiodaperua-db
    restart: always
    environment:
      POSTGRES_DB: TioDaPerua
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sa
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Back-end (API Java Spring Boot)
  api:
    image: ghcr.io/grigs2/backendjava/backend:latest
    container_name: tiodaperua-api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Aqui dizemos para a API procurar o banco no host 'db' (nome do serviço acima)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/TioDaPerua
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=sa
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  # 3. Front-end (Expo Web / Nginx)
  web:
    image: ghcr.io/grigs2/frontendreact/frontend:latest
    container_name: tiodaperua-front
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pg_data: